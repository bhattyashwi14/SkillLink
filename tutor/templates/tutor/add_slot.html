<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Slot | SkillLink</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #0b0b1a;
            color: white;
        }

        .slot-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            backdrop-filter: blur(15px);
        }

        .text-gradient {
            background: linear-gradient(45deg, #93c5fd, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-control {
            background-color: #16162d;
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            border-radius: 14px;
            padding: 10px 16px;
        }

        .form-control:focus {
            background-color: #1e1e3f;
            border-color: #93c5fd;
            box-shadow: 0 0 0 0.15rem rgba(147,197,253,0.25);
            color: white;
        }

        /* SOFT PLACEHOLDER COLOR */
        .form-control::placeholder {
            color: #94a3b8;
            opacity: 1;
        }

        label {
            color: #cbd5e1;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .btn-primary-custom {
            background: linear-gradient(45deg, #6366f1, #a855f7);
            border: none;
            border-radius: 50px;
            padding: 10px 28px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.3);
        }

        .btn-outline-soft {
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50px;
            padding: 10px 28px;
            color: #cbd5e1;
        }

        .btn-outline-soft:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="slot-card shadow-lg">

                <h3 class="fw-bold mb-4 text-center text-gradient">
                    Add New Session Slot
                </h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Skill</label>
                        <input type="text"
                               name="skill_name"
                               class="form-control"
                               placeholder="e.g. Data Structures"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Date</label>
                        <input type="date"
                               name="date"
                               class="form-control"
                               required>
                    </div>

                    <div class="row mb-4">
                        <div class="col">
                            <label>Start Time</label>
                            <input type="time"
                                   name="start_time"
                                   class="form-control"
                                   required>
                        </div>
                        <div class="col">
                            <label>End Time</label>
                            <input type="time"
                                   name="end_time"
                                   class="form-control"
                                   required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'tutor:tutor_dashboard' %}"
                           class="btn btn-outline-soft">
                            Cancel
                        </a>

                        <button type="submit"
                                class="btn btn-primary-custom">
                            Save Slot
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
