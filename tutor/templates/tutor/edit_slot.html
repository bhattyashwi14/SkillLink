{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Slot | SkillLink</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: #0b0b1a;
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .card-dark {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(12px);
        }

        .form-control {
            background-color: #16162d;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
        }

        .form-control:focus {
            background-color: #16162d;
            color: white;
            border-color: #93c5fd;
            box-shadow: none;
        }

        .btn-save {
            background: linear-gradient(45deg, #6366f1, #a855f7);
            border: none;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-delete {
            border-radius: 12px;
        }

        .navbar-glass{
        background:rgba(15,23,42,0.7);
        backdrop-filter:blur(14px);
        border-bottom:1px solid rgba(125,211,252,0.15);
        }

        .brand{
        display:flex;
        align-items:center;
        gap:12px;
        }

        .brand img{
        width:42px;
        height:42px;
        border-radius:50%;
        border:2px solid rgba(56,189,248,0.6);
        box-shadow:0 0 10px rgba(56,189,248,0.5);
        }

        .brand span{
        font-size:24px;
        font-weight:700;
        background: linear-gradient(90deg,#22d3ee,#6366f1,#8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-glass px-4 py-3">

<div class="brand">
<img src="{% static 'core/logo.png' %}">
<span>SkillLink</span>
</div>

<div class="ms-auto">
<a href="{% url 'tutor:tutor_dashboard' %}" class="btn btn-outline-info btn-sm rounded-pill px-3">
← Back to Dashboard
</a>
</div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <div class="card-dark">

                <h3 class="fw-bold mb-4 text-center">Edit Availability Slot</h3>

                <form method="POST">
                    {% csrf_token %}

                    <!-- Skill -->
                    <div class="mb-3">
                        <label class="form-label">Skill</label>
                        <input type="text"
                               name="skill_name"
                               value="{{ slot.skill_name }}"
                               class="form-control"
                               required>
                    </div>

                    <!-- Date -->
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date"
                               name="date"
                               value="{{ slot.date|date:'Y-m-d' }}"
                               class="form-control"
                               required>
                    </div>

                    <!-- Start Time -->
                    <div class="mb-3">
                        <label class="form-label">Start Time</label>
                        <input type="time"
                               name="start_time"
                               value="{{ slot.start_time|time:'H:i' }}"
                               class="form-control"
                               required>
                    </div>

                    <!-- End Time -->
                    <div class="mb-4">
                        <label class="form-label">End Time</label>
                        <input type="time"
                               name="end_time"
                               value="{{ slot.end_time|time:'H:i' }}"
                               class="form-control"
                               required>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-save text-white px-4">
                            Save Changes
                        </button>

                        <button type="submit"
                                name="delete"
                                class="btn btn-outline-danger px-4">
                            Delete Slot
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
