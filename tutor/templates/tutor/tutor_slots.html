<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Session | SkillLink</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#020617;
color:white;
font-family:Inter;
}

/* PAGE TITLE */
.page-title{
font-size:32px;
font-weight:700;
background: linear-gradient(90deg,#22d3ee,#6366f1,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SLOT CARD */
.slot-card{
background:linear-gradient(160deg,#0f172a,#020617);
border:1px solid rgba(125,211,252,0.18);
border-radius:20px;
padding:22px;
transition:0.3s;
}

.slot-card:hover{
transform:translateY(-6px);
border-color:#38bdf8;
box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

/* DAY BADGE */
.day-badge{
background:rgba(56,189,248,0.15);
color:#7dd3fc;
padding:6px 14px;
border-radius:999px;
font-size:13px;
display:inline-block;
}

/* TIME TEXT */
.time-text{
font-size:18px;
font-weight:600;
}

/* BOOK BUTTON */
.book-btn{
margin-top:15px;
border:none;
padding:10px 18px;
border-radius:999px;
background:linear-gradient(90deg,#22d3ee,#6366f1);
color:white;
font-weight:600;
transition:0.3s;
}

.book-btn:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="text-center mb-5">
<div class="page-title">
Book Session with {{ tutor.user.first_name|default:tutor.user.username }}
</div>

<p class="text-secondary mt-2">
Choose your preferred time slot
</p>
</div>

<div class="row">

{% for slot in slots %}

<div class="col-md-4 mb-4">

<div class="slot-card text-center">

<div class="day-badge">
{{ slot.day_of_week }}
</div>

<div class="time-text mt-3">
{{ slot.start_time }} → {{ slot.end_time }}
</div>

<button class="book-btn w-100">
Book This Slot
</button>

</div>

</div>

{% empty %}

<div class="text-center">
<h5>No slots available</h5>
<p class="text-secondary">
Tutor hasn't added availability yet.
</p>
</div>

{% endfor %}

</div>

</div>

</body>
</html>
