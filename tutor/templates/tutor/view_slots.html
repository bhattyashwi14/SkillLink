<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Available Slots | SkillLink</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#020617;
color:white;
font-family:Inter;
}

/* HEADER */
.page-title{
font-size:32px;
font-weight:700;
text-align:center;
margin-top:50px;
background: linear-gradient(90deg,#22d3ee,#6366f1,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SLOT CARD */
.slot-card{
background:linear-gradient(160deg,#0f172a,#020617);
border:1px solid rgba(125,211,252,0.18);
border-radius:20px;
padding:20px;
transition:0.3s;
}

.slot-card:hover{
transform:translateY(-6px);
border-color:#38bdf8;
box-shadow:0 15px 30px rgba(0,0,0,0.6);
}

/* DAY CHIP */
.day-chip{
display:inline-block;
padding:6px 14px;
border-radius:999px;
background:rgba(56,189,248,0.15);
color:#7dd3fc;
font-size:13px;
}

/* BOOK BUTTON */
.book-btn{
margin-top:15px;
border:none;
padding:10px 18px;
border-radius:999px;
background:linear-gradient(90deg,#22d3ee,#6366f1);
color:white;
font-weight:600;
transition:0.3s;
width:100%;
}

.book-btn:hover{
transform:scale(1.03);
}

</style>

</head>

<body>

<div class="container">

<h2 class="page-title">
Available Slots — {{ tutor.user.first_name|default:tutor.user.username }}
</h2>

<div class="row mt-5">

{% for slot in slots %}

<div class="col-md-4 mb-4">

<div class="slot-card">

<div class="d-flex justify-content-between align-items-center">

<div class="day-chip">
{{ slot.day_of_week }}
</div>

</div>

<div class="mt-3">
🕒 {{ slot.start_time }} — {{ slot.end_time }}
</div>

<a href="{% url 'book_slot' slot.id %}">
<button class="book-btn">
Book Session 🚀
</button>
</a>


</div>

</div>

{% empty %}

<div class="text-center mt-5">
<h5>No Slots Available</h5>
<p class="text-secondary">Tutor hasn’t added slots yet</p>
</div>

{% endfor %}

</div>

</div>

</body>
</html>
