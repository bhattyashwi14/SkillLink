<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillLink | Learner Access</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>

<body class="bg-dark text-white d-flex align-items-center justify-content-center min-vh-100">

<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card bg-dark border border-secondary rounded-5 shadow-lg p-5">

                <h2 class="text-gradient fw-bold mb-3">Welcome, Learner 🎓</h2>
                <p class="text-muted mb-4">Choose how you want to continue</p>

                <div class="d-grid gap-3">
                    <button class="btn btn-primary-custom rounded-pill shadow-lg"
                            onclick="window.location.href='{% url 'learn_login' %}?mode=login'">
                        Login
                    </button>

                    <button class="btn btn-outline-info rounded-pill shadow-lg"
                            onclick="window.location.href='{% url 'learn_login' %}?mode=signup'">
                        Signup
                    </button>
                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
